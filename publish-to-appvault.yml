# ─────────────────────────────────────────────────────────────────────────────
# publish-to-appvault.yml
#
# Drop this file into ANY of your app repos at:
#   .github/workflows/publish-to-appvault.yml
#
# It fires on every release and pushes updated metadata into your
# AppVault site repo's apps.json, which GitHub Pages then serves.
#
# REQUIRED SECRETS (set on the app repo):
#   APPVAULT_TOKEN  — a Personal Access Token (PAT) with `repo` scope
#                     that has write access to your AppVault site repo.
#
# REQUIRED VARS (edit the env block below):
#   APPVAULT_REPO  — e.g.  "youruser/appvault-site"
#   APP_ID         — unique slug for THIS app, e.g. "devnotes"
# ─────────────────────────────────────────────────────────────────────────────

name: Publish to AppVault

on:
  release:
    types: [published]

env:
  APPVAULT_REPO: "youruser/appvault-site"   # ← change this
  APP_ID:        "my-app"                    # ← change this (unique per repo)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:

      # ── 1. Checkout the AppVault site repo ──────────────────────────────────
      - name: Checkout AppVault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APPVAULT_REPO }}
          token: ${{ secrets.APPVAULT_TOKEN }}
          path: appvault

      # ── 2. Gather release metadata ──────────────────────────────────────────
      - name: Collect metadata
        id: meta
        run: |
          echo "version=${{ github.event.release.tag_name }}"    >> $GITHUB_OUTPUT
          echo "download_url=${{ github.event.release.html_url }}" >> $GITHUB_OUTPUT
          echo "published=${{ github.event.release.published_at }}" >> $GITHUB_OUTPUT

      # ── 3. Fetch star / download counts from GitHub API ─────────────────────
      - name: Fetch repo stats
        id: stats
        run: |
          REPO="${{ github.repository }}"
          DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}")
          STARS=$(echo "$DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stargazers_count',0))")
          
          # Sum download counts across all release assets
          RELEASES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/releases")
          DOWNLOADS=$(echo "$RELEASES" | python3 -c "
          import sys, json
          releases = json.load(sys.stdin)
          total = sum(a.get('download_count', 0) for r in releases for a in r.get('assets', []))
          print(total)
          ")
          echo "stars=$STARS"     >> $GITHUB_OUTPUT
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT

      # ── 4. Update apps.json in the AppVault repo ─────────────────────────────
      # This step reads the current apps.json, upserts this app's entry,
      # and writes it back. It uses Python for safe JSON manipulation.
      - name: Update apps.json
        run: |
          cd appvault

          python3 << 'EOF'
          import json, os, datetime

          JSON_PATH = "apps.json"

          # Load existing apps.json (or start fresh)
          try:
              with open(JSON_PATH) as f:
                  apps = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              apps = []

          app_id   = os.environ["APP_ID"]
          version  = os.environ["VERSION"].lstrip("v")
          dl_url   = os.environ["DOWNLOAD_URL"]
          stars    = int(os.environ["STARS"])
          downloads = int(os.environ["DOWNLOADS"])

          # Date in YYYY-MM-DD
          today = datetime.date.today().isoformat()

          # Find existing entry or create a new one
          existing = next((a for a in apps if a["id"] == app_id), None)
          if existing:
              existing["version"]     = version
              existing["downloadUrl"] = dl_url
              existing["stars"]       = stars
              existing["downloads"]   = downloads
              existing["updated"]     = today
          else:
              # New app entry — fill in name/icon/etc. manually or
              # read from an app-metadata.json in this repo (see note below)
              apps.append({
                  "id":          app_id,
                  "name":        app_id.replace("-", " ").title(),
                  "version":     version,
                  "description": "A new app.",
                  "icon":        "📦",
                  "iconBg":      "linear-gradient(135deg,#1a1a2e,#0f0f1a)",
                  "tags":        [],
                  "platforms":   [],
                  "downloadUrl": dl_url,
                  "downloads":   downloads,
                  "stars":       stars,
                  "updated":     today
              })

          with open(JSON_PATH, "w") as f:
              json.dump(apps, f, indent=2)

          print(f"Updated {app_id} → v{version}")
          EOF
        env:
          APP_ID:       ${{ env.APP_ID }}
          VERSION:      ${{ steps.meta.outputs.version }}
          DOWNLOAD_URL: ${{ steps.meta.outputs.download_url }}
          STARS:        ${{ steps.stats.outputs.stars }}
          DOWNLOADS:    ${{ steps.stats.outputs.downloads }}

      # ── 5. Commit & push back to AppVault repo ───────────────────────────────
      - name: Commit updated apps.json
        run: |
          cd appvault
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ${{ env.APP_ID }} → ${{ steps.meta.outputs.version }}"
          git push

# ─────────────────────────────────────────────────────────────────────────────
# TIP: Put a file called `app-metadata.json` at the root of each app repo
# to provide richer info (description, icon, tags, platforms) that the
# script above can read instead of the placeholder defaults. Example:
#
#  {
#    "name": "DevNotes",
#    "description": "A blazing-fast markdown notepad.",
#    "icon": "📝",
#    "iconBg": "linear-gradient(135deg,#1e3a5f,#0f2040)",
#    "tags": ["productivity","markdown"],
#    "platforms": ["windows","macos","linux"]
#  }
# ─────────────────────────────────────────────────────────────────────────────
